<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>eFootball PL 2026 — Fixtures & Results</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="icon" href="league-logo.jpg" type="image/jpeg"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#c9a84c"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="ePL 2026"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <a class="logo-area" href="index.html">
      <img src="league-logo.jpg" alt="eFootball PL 2026"/>
      <div class="logo-text">
        <span class="league-name">eFOOTBALL PL</span>
        <span class="season">2026 Season</span>
      </div>
    </a>
    <nav>
      <a href="index.html">Table</a>
      <a href="fixtures.html" class="active">Fixtures</a>
      <a href="scorers.html">Golden Boot</a>
      <a href="h2h.html">H2H</a>
      <a href="team.html">Teams</a>
    </nav>
  </div>
</header>

<main>
  <div class="page-title">Fixtures &amp; Results</div>
  <div class="page-subtitle">Home &amp; Away &middot; 90 Matches Total</div>

  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px;">
    <button class="btn btn-gold" id="filterAll" onclick="setFilter('all')">All Matches</button>
    <button class="btn btn-ghost" id="filterPlayed" onclick="setFilter('played')">Results</button>
    <button class="btn btn-ghost" id="filterUpcoming" onclick="setFilter('upcoming')">Upcoming</button>
  </div>

  <div id="fixturesContainer">
    <div class="loading"><div class="spinner"></div><br/>Loading fixtures...</div>
  </div>
</main>

<div id="toast"></div>

<footer>
  <p>Created by <span>ZiezGeek</span> &middot; eFootball PL 2026 &middot; All Rights Reserved</p>
</footer>

<script>
  window.setFilter = function(f) {
    window._fixtureFilter = f;
    ['All','Played','Upcoming'].forEach(x => {
      document.getElementById('filter'+x).className = 'btn btn-ghost';
    });
    document.getElementById('filter' + f.charAt(0).toUpperCase() + f.slice(1)).className = 'btn btn-gold';
    if (window._renderFixtures) window._renderFixtures();
  };
</script>
<script type="module" src="fixtures-public.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
